<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VideoFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,300,0,0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#111111;--sidebar:#181818;--s-act:#212121;
  --surf:#1c1c1c;--surf2:#222222;
  --bdr:#272727;--bdr2:#303030;--bdr3:#3a3a3a;
  --text:#e2e2e2;--sub:#888888;--dim:#484848;--dimmer:#333333;
  --s1-t:#7a7a7a;--s1-b:rgba(122,122,122,.10);
  --s2-t:#ababab;--s2-b:rgba(171,171,171,.10);
  --s3-t:#d8d8d8;--s3-b:rgba(216,216,216,.10);
  --red:#c0392b;--red-b:rgba(192,57,43,.10);
  --accent:#7C3AED;--rad:10px;
}
[data-theme="light"]{
  --bg:#f4f4f5;--sidebar:#ffffff;--s-act:#f0f0f2;
  --surf:#ffffff;--surf2:#f7f7f8;
  --bdr:#e4e4e7;--bdr2:#d4d4d8;--bdr3:#c4c4c8;
  --text:#18181b;--sub:#71717a;--dim:#a1a1aa;--dimmer:#e4e4e7;
  --s1-t:#71717a;--s1-b:rgba(113,113,122,.08);
  --s2-t:#52525b;--s2-b:rgba(82,82,91,.08);
  --s3-t:#27272a;--s3-b:rgba(39,39,42,.08);
  --red:#dc2626;--red-b:rgba(220,38,38,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;transition:background .2s,color .2s}

/* ── SIDEBAR ── */
.sidebar{width:220px;min-width:220px;height:100vh;background:var(--sidebar);border-right:1px solid var(--bdr);display:flex;flex-direction:column;padding:20px 0 0;overflow-y:auto;transition:background .2s,border-color .2s}
.s-logo{padding:0 16px 18px;display:flex;flex-direction:column;gap:2px}
.s-logo-title{font-size:.95rem;font-weight:600;color:var(--text);letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.s-logo-sub{font-size:.65rem;color:var(--sub);font-weight:400}
.s-divider{height:1px;background:var(--bdr);margin:8px 12px}
.s-label{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);padding:8px 16px 4px}
.s-nav{display:flex;flex-direction:column;gap:1px;padding:0 8px}
.n-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;border:none;background:none;cursor:pointer;color:var(--sub);font-family:'Poppins',sans-serif;font-size:.75rem;font-weight:400;transition:all .12s;width:100%;text-align:left}
.n-item:hover{background:var(--s-act);color:var(--text)}
.n-item.active{background:var(--s-act);color:var(--text);font-weight:500}
.n-count{margin-left:auto;font-size:.65rem;color:var(--dim);background:var(--surf2);padding:1px 6px;border-radius:20px;border:1px solid var(--bdr);flex-shrink:0}
.e-avatar{width:22px;height:22px;border-radius:6px;background:var(--surf2);border:1px solid var(--bdr2);font-size:.55rem;font-weight:600;color:var(--sub);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.proj-empty{font-size:.7rem;color:var(--dim);padding:8px 10px}

/* realtime dot */
.rt-dot{width:6px;height:6px;border-radius:50%;background:#6b7280;flex-shrink:0;transition:background .3s}
.rt-dot.connected{background:#16a34a;box-shadow:0 0 6px rgba(22,163,74,.5)}
.rt-dot.connecting{background:#d97706;animation:pulse-dot 1s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}

/* theme toggle */
.theme-toggle{display:flex;align-items:center;gap:4px;padding:12px 16px 16px;border-top:1px solid var(--bdr);margin-top:4px}
.theme-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--bdr2);background:none;cursor:pointer;color:var(--sub);display:flex;align-items:center;justify-content:center;transition:all .12s}
.theme-btn:hover{background:var(--s-act);color:var(--text);border-color:var(--bdr3)}
.theme-btn.active{background:var(--s-act);color:var(--text);border-color:var(--bdr3)}
.material-symbols-outlined{font-size:17px;font-variation-settings:'opsz' 20,'wght' 300,'FILL' 0,'GRAD' 0}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:18px 28px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg);transition:background .2s,border-color .2s}
.topbar-left{display:flex;flex-direction:column;gap:2px}
.topbar-greeting{font-size:.65rem;color:var(--sub)}
.topbar-title{font-size:1rem;font-weight:600;color:var(--text)}
.btn-add{padding:7px 16px;border-radius:20px;border:1px solid var(--bdr3);background:none;color:var(--sub);font-family:'Poppins',sans-serif;font-size:.73rem;font-weight:400;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:6px}
.btn-add:hover{border-color:var(--text);color:var(--text)}

.content{flex:1;overflow-y:auto;padding:24px 28px}

/* ── PROJECT LIST ── */
.proj-grid{display:flex;flex-direction:column;gap:6px}
.proj-card{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);cursor:pointer;transition:all .12s}
.proj-card:hover{border-color:var(--bdr3)}
.proj-card-title{font-size:.82rem;font-weight:500;color:var(--text);flex:1}
.proj-card-meta{font-size:.68rem;color:var(--dim)}
.proj-card-due{font-size:.68rem;color:var(--sub)}
.proj-card-due.late{color:var(--red)}
.status-badge{padding:3px 10px;border-radius:20px;font-size:.65rem;font-weight:500;flex-shrink:0}
.st-nao_editado{background:var(--s1-b);color:var(--s1-t)}
.st-editando{background:rgba(217,119,6,.12);color:#d97706}
.st-editado{background:rgba(22,163,74,.10);color:#16a34a}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;gap:12px;color:var(--dim)}
.empty-state svg{opacity:.3}
.empty-state p{font-size:.78rem}

/* loading */
.loading-state{display:flex;align-items:center;justify-content:center;padding:80px 0;gap:10px;color:var(--dim);font-size:.78rem}
.spin{width:16px;height:16px;border:2px solid var(--bdr3);border-top-color:var(--sub);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DETAIL ── */
.detail-wrap{display:flex;flex-direction:column;gap:20px;max-width:680px}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--sub);font-family:'Poppins',sans-serif;font-size:.75rem;cursor:pointer;padding:0 0 6px;transition:color .12s}
.back-btn:hover{color:var(--text)}
.detail-title{font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:4px}
.section-label{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);margin-bottom:8px}

/* status tabs */
.status-tabs{display:flex;gap:6px}
.st-tab{padding:5px 14px;border-radius:20px;font-size:.7rem;font-weight:500;border:1px solid var(--bdr2);background:none;cursor:pointer;color:var(--sub);font-family:'Poppins',sans-serif;transition:all .12s}
.st-tab:hover{border-color:var(--bdr3);color:var(--text)}
.st-tab.active-nao_editado{background:var(--s1-b);color:var(--s1-t);border-color:rgba(122,122,122,.2)}
.st-tab.active-editando{background:rgba(217,119,6,.12);color:#d97706;border-color:rgba(217,119,6,.25)}
.st-tab.active-editado{background:rgba(22,163,74,.10);color:#16a34a;border-color:rgba(22,163,74,.2)}

/* editor pills */
.editor-pills{display:flex;flex-wrap:wrap;gap:7px}
.ed-pill{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 7px;border-radius:20px;border:1px solid var(--bdr2);background:var(--surf2);cursor:pointer;transition:all .12s;font-size:.72rem;color:var(--sub);font-family:'Poppins',sans-serif}
.ed-pill:hover{border-color:var(--bdr3);color:var(--text)}
.ed-pill.selected{border-color:var(--bdr3);color:var(--text);background:var(--s-act)}
.ed-pill .e-avatar{width:18px;height:18px;border-radius:5px;font-size:.5rem}

/* due date */
.due-row{display:flex;align-items:center;gap:10px}
.due-input{background:var(--surf);border:1px solid var(--bdr2);border-radius:8px;color:var(--text);font-family:'Poppins',sans-serif;font-size:.72rem;padding:5px 10px;outline:none;transition:border-color .12s}
.due-input:focus{border-color:var(--bdr3)}
.due-late-tag{font-size:.65rem;color:var(--red);background:var(--red-b);padding:2px 8px;border-radius:10px}

/* notes */
.notes-ta{width:100%;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);color:var(--text);font-family:'Poppins',sans-serif;font-size:.78rem;padding:12px 14px;resize:vertical;min-height:80px;outline:none;transition:border-color .12s}
.notes-ta:focus{border-color:var(--bdr3)}

/* links */
.link-item{display:flex;align-items:center;gap:9px;padding:8px 12px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);margin-bottom:5px}
.link-anchor{flex:1;font-size:.77rem;color:var(--sub);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-anchor:hover{color:var(--text)}
.add-link-btn{display:flex;align-items:center;gap:7px;padding:8px 12px;border:1px dashed var(--bdr2);border-radius:var(--rad);color:var(--dim);font-size:.75rem;cursor:pointer;background:none;font-family:'Poppins',sans-serif;transition:all .12s;width:100%;text-align:left}
.add-link-btn:hover{border-color:var(--bdr3);color:var(--sub)}
.link-input-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surf);border:1px solid var(--bdr2);border-radius:var(--rad)}
.link-in{flex:1;background:none;border:none;outline:none;font-family:'Poppins',sans-serif;font-size:.75rem;color:var(--text)}
.link-in::placeholder{color:var(--dim)}
.link-sep{width:1px;height:14px;background:var(--bdr2)}
.link-ok-btn,.link-cancel-btn{background:none;border:none;cursor:pointer;font-family:'Poppins',sans-serif;font-size:.7rem;padding:2px 4px}
.link-ok-btn{color:var(--s3-t)}
.link-cancel-btn{color:var(--dim)}
.icon-btn{width:22px;height:22px;border:none;background:none;cursor:pointer;color:var(--dim);display:flex;align-items:center;justify-content:center;border-radius:5px;transition:all .1s;padding:0}
.icon-btn:hover{color:var(--sub);background:var(--s-act)}

/* tasks */
.task-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);margin-bottom:5px;transition:all .12s}
.task-row:hover{border-color:var(--bdr2)}
.task-row.is-done{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.14)}
.task-row.is-done:hover{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.22)}
.task-row.is-done .task-title{color:var(--dim);text-decoration:line-through}
.task-row.is-late{background:rgba(192,57,43,.06);border-color:rgba(192,57,43,.18)}
.task-row.is-late:hover{background:rgba(192,57,43,.09);border-color:rgba(192,57,43,.28)}
.task-check{width:16px;height:16px;border-radius:5px;border:1px solid var(--bdr3);background:none;cursor:pointer;flex-shrink:0;transition:all .12s;display:flex;align-items:center;justify-content:center}
.task-check.checked{background:rgba(34,197,94,.2);border-color:rgba(34,197,94,.5)}
.task-title{font-size:.78rem;color:var(--text);flex:1}
.task-assignee{font-size:.65rem;color:var(--dim)}
.add-task-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px dashed var(--bdr2);border-radius:var(--rad);margin-top:4px}
.task-in{flex:1;background:none;border:none;outline:none;font-family:'Poppins',sans-serif;font-size:.78rem;color:var(--text)}
.task-in::placeholder{color:var(--dim)}
.task-assign-select{background:var(--surf2);border:1px solid var(--bdr2);border-radius:6px;color:var(--sub);font-family:'Poppins',sans-serif;font-size:.68rem;padding:3px 6px;outline:none}
.task-assign-select option{background:var(--surf)}
.task-add-ok{padding:3px 10px;border-radius:6px;background:var(--surf2);border:1px solid var(--bdr2);color:var(--sub);font-family:'Poppins',sans-serif;font-size:.7rem;cursor:pointer;transition:all .12s}
.task-add-ok:hover{color:var(--text);border-color:var(--bdr3)}

/* editor view */
.ed-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.ed-avatar-lg{width:36px;height:36px;border-radius:10px;background:var(--surf2);border:1px solid var(--bdr2);font-size:.75rem;font-weight:600;color:var(--sub);display:flex;align-items:center;justify-content:center}
.ed-name{font-size:1rem;font-weight:600;color:var(--text)}
.ed-task-proj{font-size:.65rem;color:var(--dim);margin-left:auto}

/* confirm inline */
.confirm-inline{display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--sub)}
.confirm-yes{color:var(--red);background:none;border:none;font-family:'Poppins',sans-serif;font-size:.72rem;cursor:pointer}
.confirm-yes:hover{text-decoration:underline}
.confirm-no{color:var(--dim);background:none;border:none;font-family:'Poppins',sans-serif;font-size:.72rem;cursor:pointer}
.confirm-no:hover{color:var(--sub)}

/* ── GLASS DIALOG ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100}
.glass-dialog{background:rgba(24,24,24,.92);border:1px solid rgba(255,255,255,.08);border-radius:16px;backdrop-filter:blur(32px);padding:24px;width:320px;display:flex;flex-direction:column;gap:16px}
[data-theme="light"] .glass-dialog{background:rgba(255,255,255,.92);border:1px solid rgba(0,0,0,.08)}
.dlg-title{font-size:.88rem;font-weight:600;color:var(--text)}
.dlg-input{width:100%;background:var(--surf2);border:1px solid var(--bdr2);border-radius:8px;color:var(--text);font-family:'Poppins',sans-serif;font-size:.8rem;padding:9px 12px;outline:none;transition:border-color .12s}
.dlg-input:focus{border-color:var(--bdr3)}
.dlg-btns{display:flex;gap:8px;justify-content:flex-end}
.dlg-cancel{padding:7px 16px;border-radius:8px;border:1px solid var(--bdr2);background:none;color:var(--sub);font-family:'Poppins',sans-serif;font-size:.75rem;cursor:pointer;transition:all .12s}
.dlg-cancel:hover{border-color:var(--bdr3);color:var(--text)}
.dlg-save{padding:7px 16px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-family:'Poppins',sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;transition:opacity .12s}
.dlg-save:hover{opacity:.85}
.dlg-save:disabled{opacity:.5;cursor:not-allowed}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr3);border-radius:2px}
</style>
</head>
<body>

<div class="sidebar">
  <div class="s-logo">
    <span class="s-logo-title">VideoFlow <span class="rt-dot connecting" id="rt-dot" title="Conectando…"></span></span>
    <span class="s-logo-sub">Controle de Edição</span>
  </div>
  <div class="s-divider"></div>
  <div class="s-label">Editores</div>
  <nav class="s-nav">
    <button class="n-item" onclick="setView(this,'ed-ashley')" data-view="ed-ashley">
      <span class="e-avatar">AM</span><span class="n-label">Ashley Michel</span><span class="n-count" id="nc-ed-ashley"></span>
    </button>
    <button class="n-item" onclick="setView(this,'ed-caio')" data-view="ed-caio">
      <span class="e-avatar">CA</span><span class="n-label">Caio Augusto</span><span class="n-count" id="nc-ed-caio"></span>
    </button>
    <button class="n-item" onclick="setView(this,'ed-rafael')" data-view="ed-rafael">
      <span class="e-avatar">RC</span><span class="n-label">Rafael Castro</span><span class="n-count" id="nc-ed-rafael"></span>
    </button>
  </nav>
  <div class="s-divider"></div>
  <div class="s-label">Projetos</div>
  <nav class="s-nav" id="proj-nav"><div class="proj-empty">Carregando…</div></nav>
  <div style="flex:1"></div>
  <div class="theme-toggle">
    <button class="theme-btn" id="btn-dark" onclick="setTheme('dark')" title="Modo escuro">
      <span class="material-symbols-outlined">dark_mode</span>
    </button>
    <button class="theme-btn" id="btn-light" onclick="setTheme('light')" title="Modo claro">
      <span class="material-symbols-outlined">light_mode</span>
    </button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-greeting" id="greeting"></span>
      <span class="topbar-title" id="view-title">Todos os projetos</span>
    </div>
    <button class="btn-add" onclick="openNewProj()">
      <span style="font-size:.9rem;line-height:1">＋</span> Adicionar Projeto
    </button>
  </div>
  <div class="content" id="content">
    <div class="loading-state"><div class="spin"></div> Carregando projetos…</div>
  </div>
</div>

<!-- Dialog: novo projeto -->
<div class="overlay" id="new-proj-overlay" style="display:none" onclick="if(event.target===this)closeNewProj()">
  <div class="glass-dialog">
    <div class="dlg-title">Novo Projeto</div>
    <input class="dlg-input" id="new-proj-input" placeholder="Nome do projeto…">
    <div class="dlg-btns">
      <button class="dlg-cancel" onclick="closeNewProj()">Cancelar</button>
      <button class="dlg-save" id="dlg-save-btn" onclick="saveNewProj()">Criar</button>
    </div>
  </div>
</div>

<script>
/* ── Supabase ── */
const { createClient } = supabase;
const sb = createClient(
  'https://putooalmbcrrdmuebose.supabase.co',
  'sb_publishable_pBU1FhcJmwj2PNUhOVJNeg_QPbiO6zd'
);

/* ── State ── */
const state = { projects: [], tasks: [] };
let view = 'todos', prevView = 'todos';
let confirmTid = null, confirmPid = null;
let linkInputOpen = false;
let notesTimer = null;

/* ── Editors ── */
const ALL_EDITORS = [
  { name:'Ashley Michel', init:'AM', view:'ed-ashley' },
  { name:'Caio Augusto',  init:'CA', view:'ed-caio'   },
  { name:'Rafael Castro', init:'RC', view:'ed-rafael' },
];
const VID_LABELS = { todos:'Todos os projetos', nao_editado:'Não editados', editando:'Em edição', editado:'Editados' };
const ST_LABELS  = { nao_editado:'Não Editado', editando:'Editando', editado:'Editado' };

/* ── Utils ── */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6) }
function today(){ return new Date().toISOString().slice(0,10) }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function fmtDate(d){ if(!d)return''; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}` }
function isLate(p){ return p.due_date && p.status !== 'editado' && p.due_date < today() }
function greeting(){ const h=new Date().getHours(); return h<12?'Bom dia,':h<18?'Boa tarde,':'Boa noite,' }

/* ── Theme ── */
function setTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('vf_theme', t);
  document.getElementById('btn-dark').classList.toggle('active', t==='dark');
  document.getElementById('btn-light').classList.toggle('active', t==='light');
}
setTheme(localStorage.getItem('vf_theme') || 'dark');

/* ── Realtime indicator ── */
function setRtStatus(s){
  const dot = document.getElementById('rt-dot');
  if(!dot) return;
  dot.className = 'rt-dot ' + s;
  dot.title = s==='connected' ? 'Tempo real ativo' : s==='connecting' ? 'Conectando…' : 'Desconectado';
}

/* ── Init ── */
async function init(){
  const [pr, tr] = await Promise.all([
    sb.from('projects').select('*').order('created_at', { ascending: true }),
    sb.from('tasks').select('*').order('created_at', { ascending: true }),
  ]);

  state.projects = pr.data || [];
  state.tasks    = tr.data || [];

  if (!state.projects.length) await seed();

  render();

  /* Real-time channel */
  sb.channel('vf-realtime')
    .on('postgres_changes', { event:'*', schema:'public', table:'projects' }, ({ eventType, new: n, old: o }) => {
      if      (eventType === 'INSERT') state.projects = [...state.projects, n];
      else if (eventType === 'UPDATE') state.projects = state.projects.map(p => p.id === n.id ? n : p);
      else if (eventType === 'DELETE') state.projects = state.projects.filter(p => p.id !== o.id);
      render();
    })
    .on('postgres_changes', { event:'*', schema:'public', table:'tasks' }, ({ eventType, new: n, old: o }) => {
      if      (eventType === 'INSERT') state.tasks = [...state.tasks, n];
      else if (eventType === 'UPDATE') state.tasks = state.tasks.map(t => t.id === n.id ? n : t);
      else if (eventType === 'DELETE') state.tasks = state.tasks.filter(t => t.id !== o.id);
      render();
    })
    .subscribe(status => {
      if      (status === 'SUBSCRIBED')   setRtStatus('connected');
      else if (status === 'CHANNEL_ERROR') setRtStatus('disconnected');
      else                                 setRtStatus('connecting');
    });
}

/* ── Seed ── */
async function seed(){
  const ps = [
    { id:uid(), title:'Podcast Ep. 42',  status:'nao_editado', editors:['Ashley Michel'], notes:'Gravar intro separado.', links:[], due_date:'', created_at:today() },
    { id:uid(), title:'Vlog Semana 18',  status:'editando',    editors:['Caio Augusto'],  notes:'', links:[], due_date:'', created_at:today() },
    { id:uid(), title:'Review iPhone 16',status:'editado',     editors:['Rafael Castro'], notes:'Aprovado pelo cliente.', links:[], due_date:'', created_at:today() },
  ];
  const { data } = await sb.from('projects').insert(ps).select();
  state.projects = data || ps;
}

/* ── Nav ── */
function setView(el, v){
  if(!view.startsWith('proj-')) prevView = view;
  view = v;
  render();
}
function openProj(pid){
  prevView = view;
  view = 'proj-' + pid;
  confirmTid = null;
  linkInputOpen = false;
  render();
}

/* ── Render ── */
function render(){
  const grEl = document.getElementById('greeting');
  if(grEl) grEl.textContent = greeting();

  renderSidebar();

  const el = document.getElementById('content');
  const titleEl = document.getElementById('view-title');
  if(!el) return;

  if(view.startsWith('proj-')){
    renderDetail(el, titleEl, view.slice(5));
  } else if(view.startsWith('ed-')){
    renderEditorView(el, titleEl);
  } else {
    renderList(el, titleEl);
  }
}

function renderSidebar(){
  ALL_EDITORS.forEach(e => {
    const c = state.tasks.filter(t => !t.done && t.assigned_to === e.name).length;
    const el = document.getElementById('nc-' + e.view);
    if(el) el.textContent = c || '';
  });

  const nav = document.getElementById('proj-nav');
  if(!nav) return;
  if(!state.projects.length){
    nav.innerHTML = '<div class="proj-empty">Nenhum projeto ainda</div>';
  } else {
    nav.innerHTML = state.projects.map(p => `
      <button class="n-item${view==='proj-'+p.id?' active':''}" onclick="openProj('${p.id}')" data-view="proj-${p.id}">
        <span style="flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.74rem">${esc(p.title)}</span>
        <span class="status-badge st-${p.status}" style="font-size:.55rem;padding:2px 7px">${ST_LABELS[p.status]}</span>
      </button>`).join('');
  }

  document.querySelectorAll('.n-item').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
}

/* ── List view ── */
function renderList(el, titleEl){
  titleEl.textContent = VID_LABELS[view] || 'Todos os projetos';
  let ps = state.projects;
  if(view === 'nao_editado') ps = ps.filter(p => p.status === 'nao_editado');
  else if(view === 'editando')   ps = ps.filter(p => p.status === 'editando');
  else if(view === 'editado')    ps = ps.filter(p => p.status === 'editado');

  if(!ps.length){
    el.innerHTML = `<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
      <p>Nenhum projeto encontrado</p></div>`;
    return;
  }

  el.innerHTML = `<div class="proj-grid">${ps.map(p => {
    const ts = state.tasks.filter(t => t.project_id === p.id);
    const done = ts.filter(t => t.done).length;
    const late = isLate(p);
    const dueTxt = p.due_date
      ? `<span class="proj-card-due${late?' late':''}">${late?'Atrasado · ':''}${fmtDate(p.due_date)}</span>` : '';
    if(confirmPid === p.id){
      return `<div class="proj-card" style="cursor:default">
        <span class="confirm-inline">Apagar <strong style="color:var(--text)">${esc(p.title)}</strong>?
          <button class="confirm-yes" onclick="deleteProject('${p.id}')">Apagar</button>
          <button class="confirm-no" onclick="confirmPid=null;render()">Cancelar</button>
        </span>
      </div>`;
    }
    return `<div class="proj-card" onclick="openProj('${p.id}')">
      <div style="flex:1;min-width:0">
        <div class="proj-card-title">${esc(p.title)}</div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:3px">
          ${p.editors?.length ? `<span class="proj-card-meta">${esc(p.editors.join(', '))}</span>` : ''}
          ${ts.length ? `<span class="proj-card-meta">${done}/${ts.length} tarefas</span>` : ''}
          ${dueTxt}
        </div>
      </div>
      <span class="status-badge st-${p.status}">${ST_LABELS[p.status]}</span>
      <button class="icon-btn" onclick="event.stopPropagation();confirmPid='${p.id}';render()" title="Apagar projeto">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      </button>
    </div>`;
  }).join('')}</div>`;
}

/* ── Editor view ── */
function renderEditorView(el, titleEl){
  const map = { 'ed-ashley':'Ashley Michel', 'ed-caio':'Caio Augusto', 'ed-rafael':'Rafael Castro' };
  const edName = map[view] || '';
  const edInfo = ALL_EDITORS.find(e => e.name === edName);
  titleEl.textContent = edName;

  const ts = state.tasks.filter(t => t.assigned_to === edName);
  if(!ts.length){
    el.innerHTML = `<div class="ed-header"><div class="ed-avatar-lg">${edInfo?.init||''}</div><div class="ed-name">${esc(edName)}</div></div>
      <div class="empty-state"><p>Nenhuma tarefa atribuída</p></div>`;
    return;
  }

  el.innerHTML = `<div class="ed-header"><div class="ed-avatar-lg">${edInfo?.init||''}</div><div class="ed-name">${esc(edName)}</div></div>
    <div class="proj-grid">${ts.map(t => {
      const p = state.projects.find(p => p.id === t.project_id);
      return `<div class="task-row${t.done?' is-done':''}" style="cursor:pointer" onclick="openProj('${t.project_id}')">
        <button class="task-check${t.done?' checked':''}" onclick="event.stopPropagation();toggleTask('${t.id}')" title="${t.done?'Desmarcar':'Concluir'}">
          ${t.done?'<svg width="10" height="10" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="rgba(34,197,94,.8)" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>':''}
        </button>
        <span class="task-title">${esc(t.title)}</span>
        ${p ? `<span class="ed-task-proj">${esc(p.title)}</span>` : ''}
      </div>`;
    }).join('')}</div>`;
}

/* ── Detail view ── */
function renderDetail(el, titleEl, pid){
  const p = state.projects.find(p => p.id === pid);
  if(!p){ view = prevView; render(); return; }
  titleEl.textContent = p.title;

  const ts = state.tasks.filter(t => t.project_id === pid);

  const statusTabs = `<div>
    <div class="section-label">Status</div>
    <div class="status-tabs">
      ${['nao_editado','editando','editado'].map(s =>
        `<button class="st-tab${p.status===s?' active-'+s:''}" onclick="setStatus('${pid}','${s}')">${ST_LABELS[s]}</button>`
      ).join('')}
    </div></div>`;

  const editorPills = `<div>
    <div class="section-label">Editores</div>
    <div class="editor-pills">
      ${ALL_EDITORS.map(e => {
        const sel = p.editors?.includes(e.name);
        return `<button class="ed-pill${sel?' selected':''}" onclick="toggleEditor('${pid}','${e.name}')">
          <span class="e-avatar">${e.init}</span>${esc(e.name)}
        </button>`;
      }).join('')}
    </div></div>`;

  const late = isLate(p);
  const dueSection = `<div>
    <div class="section-label">Entrega</div>
    <div class="due-row">
      <input type="date" class="due-input" value="${p.due_date||''}" onchange="saveDueDate('${pid}',this.value)">
      ${late ? '<span class="due-late-tag">Atrasado</span>' : ''}
    </div></div>`;

  const notesSection = `<div>
    <div class="section-label">Notas</div>
    <textarea class="notes-ta" placeholder="Adicionar notas…" oninput="saveNotes('${pid}',this.value)">${esc(p.notes||'')}</textarea>
  </div>`;

  const linksHtml = (p.links||[]).map(l => `
    <div class="link-item">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="flex-shrink:0;opacity:.4"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <a class="link-anchor" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label||l.url)}</a>
      <button class="icon-btn" onclick="removeLink('${pid}','${l.id}')" title="Remover">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join('');

  const linkInputHtml = linkInputOpen
    ? `<div class="link-input-row">
        <input class="link-in" id="link-url-in" placeholder="URL…" onkeydown="if(event.key==='Enter')addLink('${pid}');if(event.key==='Escape')hideLinkInput()">
        <div class="link-sep"></div>
        <input class="link-in" id="link-label-in" placeholder="Rótulo opcional" style="max-width:120px" onkeydown="if(event.key==='Enter')addLink('${pid}');if(event.key==='Escape')hideLinkInput()">
        <button class="link-ok-btn" onclick="addLink('${pid}')">Salvar</button>
        <button class="link-cancel-btn" onclick="hideLinkInput()">✕</button>
      </div>`
    : `<button class="add-link-btn" onclick="showLinkInput()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar link
      </button>`;

  const linksSection = `<div>
    <div class="section-label">Links</div>
    ${linksHtml}${linkInputHtml}
  </div>`;

  const taskRows = ts.map(t => {
    if(confirmTid === t.id){
      return `<div class="task-row">
        <span class="confirm-inline">Remover tarefa?
          <button class="confirm-yes" onclick="deleteTask('${t.id}')">Remover</button>
          <button class="confirm-no" onclick="confirmTid=null;render()">Cancelar</button>
        </span></div>`;
    }
    return `<div class="task-row${t.done?' is-done':''}">
      <button class="task-check${t.done?' checked':''}" onclick="toggleTask('${t.id}')" title="${t.done?'Desmarcar':'Concluir'}">
        ${t.done?'<svg width="10" height="10" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="rgba(34,197,94,.8)" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>':''}
      </button>
      <span class="task-title">${esc(t.title)}</span>
      ${t.assigned_to ? `<span class="task-assignee">${esc(t.assigned_to)}</span>` : ''}
      <button class="icon-btn" onclick="confirmTid='${t.id}';render()" title="Remover">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      </button>
    </div>`;
  }).join('');

  const taskSection = `<div>
    <div class="section-label">Tarefas</div>
    ${taskRows}
    <div class="add-task-row">
      <input class="task-in" id="task-in-${pid}" placeholder="Nova tarefa… (Enter para adicionar)">
      <select class="task-assign-select" id="task-assign-${pid}">
        <option value="">Sem responsável</option>
        ${ALL_EDITORS.map(e => `<option value="${e.name}">${e.name}</option>`).join('')}
      </select>
      <button class="task-add-ok" onclick="addTask('${pid}')">+</button>
    </div></div>`;

  el.innerHTML = `<div style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <button class="back-btn" style="padding:0" onclick="view=prevView;confirmTid=null;linkInputOpen=false;render()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Voltar
      </button>
      ${confirmPid===pid
        ? `<span class="confirm-inline">Apagar projeto?
            <button class="confirm-yes" onclick="deleteProject('${pid}')">Apagar</button>
            <button class="confirm-no" onclick="confirmPid=null;render()">Cancelar</button>
           </span>`
        : `<button class="icon-btn" onclick="confirmPid='${pid}';render()" title="Apagar projeto">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
           </button>`
      }
    </div>
    <div class="detail-title">${esc(p.title)}</div>
  </div>
  <div class="detail-wrap">${statusTabs}${editorPills}${dueSection}${notesSection}${linksSection}${taskSection}</div>`;

  const tin = document.getElementById('task-in-' + pid);
  if(tin) tin.addEventListener('keydown', e => { if(e.key === 'Enter') addTask(pid) });
}

/* ── Actions ── */
async function setStatus(pid, s){
  state.projects = state.projects.map(p => p.id === pid ? {...p, status:s} : p);
  render();
  await sb.from('projects').update({ status:s }).eq('id', pid);
}

async function toggleEditor(pid, name){
  state.projects = state.projects.map(p => {
    if(p.id !== pid) return p;
    const editors = p.editors?.includes(name) ? p.editors.filter(e => e !== name) : [...(p.editors||[]), name];
    return { ...p, editors };
  });
  render();
  const p = state.projects.find(p => p.id === pid);
  await sb.from('projects').update({ editors: p.editors }).eq('id', pid);
}

async function saveDueDate(pid, val){
  state.projects = state.projects.map(p => p.id === pid ? {...p, due_date:val} : p);
  render();
  await sb.from('projects').update({ due_date: val }).eq('id', pid);
}

function saveNotes(pid, val){
  state.projects = state.projects.map(p => p.id === pid ? {...p, notes:val} : p);
  clearTimeout(notesTimer);
  notesTimer = setTimeout(() => sb.from('projects').update({ notes:val }).eq('id', pid), 800);
}

async function addTask(pid){
  const tin = document.getElementById('task-in-' + pid);
  const asel = document.getElementById('task-assign-' + pid);
  const title = (tin?.value || '').trim();
  if(!title) return;
  const t = { id:uid(), project_id:pid, title, assigned_to:asel?.value||'', done:false, created_at:today() };
  state.tasks = [...state.tasks, t];
  render();
  await sb.from('tasks').insert(t);
}

async function toggleTask(tid){
  const t = state.tasks.find(t => t.id === tid);
  if(!t) return;
  state.tasks = state.tasks.map(t => t.id === tid ? {...t, done:!t.done} : t);
  render();
  await sb.from('tasks').update({ done: !t.done }).eq('id', tid);
}

async function deleteTask(tid){
  state.tasks = state.tasks.filter(t => t.id !== tid);
  confirmTid = null;
  render();
  await sb.from('tasks').delete().eq('id', tid);
}

async function deleteProject(pid){
  state.projects = state.projects.filter(p => p.id !== pid);
  state.tasks = state.tasks.filter(t => t.project_id !== pid);
  confirmPid = null;
  view = prevView;
  render();
  await sb.from('tasks').delete().eq('project_id', pid);
  await sb.from('projects').delete().eq('id', pid);
}

function showLinkInput(){ linkInputOpen = true; render(); setTimeout(() => document.getElementById('link-url-in')?.focus(), 50) }
function hideLinkInput(){ linkInputOpen = false; render() }

async function addLink(pid){
  const url = (document.getElementById('link-url-in')?.value || '').trim();
  if(!url) return;
  const label = (document.getElementById('link-label-in')?.value || '').trim();
  const link = { id:uid(), url, label };
  state.projects = state.projects.map(p => p.id === pid ? {...p, links:[...(p.links||[]), link]} : p);
  linkInputOpen = false;
  render();
  const p = state.projects.find(p => p.id === pid);
  await sb.from('projects').update({ links: p.links }).eq('id', pid);
}

async function removeLink(pid, lid){
  state.projects = state.projects.map(p => p.id === pid ? {...p, links:(p.links||[]).filter(l => l.id !== lid)} : p);
  render();
  const p = state.projects.find(p => p.id === pid);
  await sb.from('projects').update({ links: p.links }).eq('id', pid);
}

/* ── New project dialog ── */
function openNewProj(){
  document.getElementById('new-proj-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('new-proj-input')?.focus(), 50);
}
function closeNewProj(){
  document.getElementById('new-proj-overlay').style.display = 'none';
  document.getElementById('new-proj-input').value = '';
  document.getElementById('dlg-save-btn').disabled = false;
}
async function saveNewProj(){
  const title = (document.getElementById('new-proj-input')?.value || '').trim();
  if(!title) return;
  const btn = document.getElementById('dlg-save-btn');
  btn.disabled = true;
  const p = { id:uid(), title, status:'nao_editado', editors:[], notes:'', links:[], due_date:'', created_at:today() };
  state.projects = [...state.projects, p];
  closeNewProj();
  view = 'proj-' + p.id;
  render();
  await sb.from('projects').insert(p);
}
document.getElementById('new-proj-input').addEventListener('keydown', e => { if(e.key === 'Enter') saveNewProj() });

/* ── Boot ── */
init();
</script>
