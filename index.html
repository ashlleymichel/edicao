<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>VideoFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#ecedf2;
  --sidebar:#ffffff;
  --s-act:#f4f4f7;
  --surf:#ffffff;
  --surf2:#f7f7fa;
  --surf3:#efeff3;
  --bdr:#e4e4ea;
  --bdr2:#d8d8e0;
  --bdr3:#c8c8d2;
  --text:#18181f;
  --sub:#72727e;
  --dim:#b0b0bc;
  --dimmer:#eaeaef;
  --accent:#18181f;
  --accent-b:rgba(24,24,31,.06);
  --red:#e5493a;
  --red-b:rgba(229,73,58,.08);
  --amber:#e07b15;
  --amber-b:rgba(224,123,21,.08);
  --green:#1a9e5c;
  --green-b:rgba(26,158,92,.08);
  --blue:#2563eb;
  --blue-b:rgba(37,99,235,.08);
  --card-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --card-shadow-hover:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
  --rad:12px;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;height:100dvh;overflow:hidden}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr3);border-radius:2px}

/* ── SIDEBAR ── */
.sidebar{
  width:228px;min-width:228px;height:100vh;height:100dvh;
  background:var(--sidebar);
  border-right:1px solid var(--bdr);
  display:flex;flex-direction:column;
  padding:0;padding-top:max(0px,env(safe-area-inset-top));
  padding-bottom:env(safe-area-inset-bottom);
  overflow-y:auto;
}
.s-logo{
  padding:22px 18px 16px;
  display:flex;align-items:center;gap:10px;
}
.s-logo-mark{
  width:30px;height:30px;border-radius:8px;
  background:var(--text);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.s-logo-mark svg{display:block}
.s-logo-text{display:flex;flex-direction:column;gap:1px}
.s-logo-title{font-size:.82rem;font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1.1;display:flex;align-items:center;gap:7px}
.s-logo-sub{font-size:.58rem;color:var(--sub);font-weight:400;letter-spacing:.01em}

.s-divider{height:1px;background:var(--bdr);margin:4px 0}
.s-label{
  font-size:.58rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.1em;color:var(--dim);
  padding:12px 18px 6px;
}
.s-nav{display:flex;flex-direction:column;gap:1px;padding:0 10px}
.n-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 10px;border-radius:8px;border:none;
  background:none;cursor:pointer;
  color:var(--sub);font-family:'Poppins',sans-serif;
  font-size:.73rem;font-weight:400;
  transition:all .12s;width:100%;text-align:left;
}
.n-item:hover{background:var(--s-act);color:var(--text)}
.n-item.active{
  background:var(--text);color:#ffffff;
  font-weight:600;
}
.n-item.active .n-count{background:rgba(255,255,255,.15);color:#fff;border-color:transparent}
.n-item.active .e-avatar{background:rgba(255,255,255,.15);border-color:transparent;color:#fff}
.n-count{
  margin-left:auto;font-size:.6rem;color:var(--dim);
  background:var(--surf3);padding:1px 7px;
  border-radius:20px;border:1px solid var(--bdr);
  flex-shrink:0;min-width:18px;text-align:center;
}
.e-avatar{
  width:22px;height:22px;border-radius:6px;
  background:var(--surf3);border:1px solid var(--bdr2);
  font-size:.52rem;font-weight:700;color:var(--sub);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;letter-spacing:-.01em;
}
.proj-empty{font-size:.7rem;color:var(--dim);padding:8px 10px}

/* realtime dot */
.rt-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--dim);flex-shrink:0;transition:background .3s;
}
.rt-dot.connected{background:var(--green);box-shadow:0 0 6px rgba(26,158,92,.4)}
.rt-dot.connecting{background:var(--amber);animation:pulse-dot 1s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  padding:16px 24px 12px;
  padding-top:max(16px,env(safe-area-inset-top));
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;background:var(--sidebar);gap:12px;
}
.topbar-left{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.topbar-greeting{font-size:.6rem;color:var(--dim);font-weight:400;letter-spacing:.01em}
.topbar-title{font-size:.9rem;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:7px;flex-shrink:0}

.btn-add{
  padding:7px 16px;border-radius:20px;
  border:1px solid var(--text);
  background:var(--text);color:#ffffff;
  font-family:'Poppins',sans-serif;font-size:.7rem;font-weight:600;
  cursor:pointer;transition:all .12s;
  display:flex;align-items:center;gap:6px;
}
.btn-add:hover{opacity:.8}
.btn-add-label{display:none}

.content{flex:1;overflow-y:auto;padding:22px 24px}

/* ── PROJECT CARDS ── */
.proj-grid{display:flex;flex-direction:column;gap:6px}
.proj-card{
  display:flex;align-items:center;gap:14px;
  padding:13px 16px;
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:var(--rad);cursor:pointer;transition:all .15s;
  box-shadow:var(--card-shadow);
}
.proj-card:hover{box-shadow:var(--card-shadow-hover);border-color:var(--bdr2);transform:translateY(-1px)}
.proj-card-title{font-size:.8rem;font-weight:500;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-card-meta{font-size:.65rem;color:var(--sub)}
.proj-card-due{font-size:.65rem;color:var(--sub)}
.proj-card-due.late{color:var(--red)}

/* status badges */
.status-badge{
  padding:3px 10px;border-radius:20px;
  font-size:.62rem;font-weight:600;flex-shrink:0;
  letter-spacing:.01em;
}
.st-nao_editado{background:var(--blue-b);color:var(--blue)}
.st-editando{background:var(--amber-b);color:var(--amber)}
.st-editado{background:var(--green-b);color:var(--green)}

/* empty / loading */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 0;gap:12px;color:var(--dim);
}
.empty-state svg{opacity:.25}
.empty-state p{font-size:.75rem;color:var(--sub)}
.loading-state{
  display:flex;align-items:center;justify-content:center;
  padding:80px 0;gap:10px;color:var(--sub);font-size:.75rem;
}
.spin{
  width:15px;height:15px;border:2px solid var(--bdr3);
  border-top-color:var(--text);border-radius:50%;
  animation:spin .7s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DETAIL ── */
.detail-wrap{display:flex;flex-direction:column;gap:20px;max-width:680px}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:8px;color:var(--sub);
  font-family:'Poppins',sans-serif;font-size:.72rem;
  cursor:pointer;padding:6px 12px;margin-bottom:12px;
  transition:all .12s;box-shadow:var(--card-shadow);
}
.back-btn:hover{border-color:var(--bdr2);color:var(--text);background:var(--surf2)}
.detail-title{font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:4px}
.section-label{
  font-size:.6rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.08em;color:var(--dim);margin-bottom:8px;
}

/* status tabs */
.status-tabs{display:flex;gap:6px;flex-wrap:wrap}
.st-tab{
  padding:5px 14px;border-radius:20px;
  font-size:.68rem;font-weight:500;
  border:1px solid var(--bdr2);background:none;
  cursor:pointer;color:var(--sub);
  font-family:'Poppins',sans-serif;transition:all .12s;
}
.st-tab:hover{border-color:var(--bdr3);color:var(--text)}
.st-tab.active-nao_editado{background:var(--blue-b);color:var(--blue);border-color:rgba(37,99,235,.2)}
.st-tab.active-editando{background:var(--amber-b);color:var(--amber);border-color:rgba(224,123,21,.2)}
.st-tab.active-editado{background:var(--green-b);color:var(--green);border-color:rgba(26,158,92,.2)}

/* editor pills */
.editor-pills{display:flex;flex-wrap:wrap;gap:7px}
.ed-pill{
  display:flex;align-items:center;gap:7px;
  padding:5px 12px 5px 7px;border-radius:20px;
  border:1px solid var(--bdr2);background:var(--surf2);
  cursor:pointer;transition:all .12s;
  font-size:.7rem;color:var(--sub);font-family:'Poppins',sans-serif;
}
.ed-pill:hover{border-color:var(--bdr3);color:var(--text)}
.ed-pill.selected{
  border-color:var(--bdr3);
  color:var(--text);background:var(--text);
  color:#fff;
}
.ed-pill.selected .e-avatar{background:rgba(255,255,255,.15);border-color:transparent;color:#fff}
.ed-pill .e-avatar{width:18px;height:18px;border-radius:5px;font-size:.48rem}

/* due date */
.due-row{display:flex;align-items:center;gap:10px}
.due-input{
  background:var(--surf);border:1px solid var(--bdr2);
  border-radius:8px;color:var(--text);
  font-family:'Poppins',sans-serif;font-size:.7rem;
  padding:5px 10px;outline:none;transition:border-color .12s;
  color-scheme:light;
}
.due-input:focus{border-color:var(--text)}
.due-late-tag{
  font-size:.62rem;color:var(--red);
  background:var(--red-b);padding:2px 9px;border-radius:10px;
}

/* notes */
.notes-ta{
  width:100%;background:var(--surf);border:1px solid var(--bdr);
  border-radius:var(--rad);color:var(--text);
  font-family:'Poppins',sans-serif;font-size:.76rem;
  padding:12px 14px;resize:vertical;min-height:80px;
  outline:none;transition:border-color .12s;
}
.notes-ta:focus{border-color:var(--bdr3)}

/* links */
.link-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 12px;background:var(--surf);
  border:1px solid var(--bdr);border-radius:var(--rad);margin-bottom:5px;
}
.link-anchor{
  flex:1;font-size:.75rem;color:var(--sub);
  text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.link-anchor:hover{color:var(--text)}
.add-link-btn{
  display:flex;align-items:center;gap:7px;
  padding:8px 12px;border:1px dashed var(--bdr2);
  border-radius:var(--rad);color:var(--dim);
  font-size:.73rem;cursor:pointer;background:none;
  font-family:'Poppins',sans-serif;transition:all .12s;
  width:100%;text-align:left;
}
.add-link-btn:hover{border-color:var(--bdr3);color:var(--sub)}
.link-input-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;background:var(--surf);
  border:1px solid var(--bdr2);border-radius:var(--rad);
}
.link-in{
  flex:1;background:none;border:none;outline:none;
  font-family:'Poppins',sans-serif;font-size:.73rem;color:var(--text);
}
.link-in::placeholder{color:var(--dim)}
.link-sep{width:1px;height:14px;background:var(--bdr2)}
.link-ok-btn,.link-cancel-btn{
  background:none;border:none;cursor:pointer;
  font-family:'Poppins',sans-serif;font-size:.68rem;padding:2px 4px;
}
.link-ok-btn{color:var(--green)}
.link-cancel-btn{color:var(--dim)}
.icon-btn{
  width:22px;height:22px;border:none;background:none;
  cursor:pointer;color:var(--dim);
  display:flex;align-items:center;justify-content:center;
  border-radius:5px;transition:all .1s;padding:0;flex-shrink:0;
}
.icon-btn:hover{color:var(--sub);background:var(--s-act)}

/* tasks */
.task-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;background:var(--surf);
  border:1px solid var(--bdr);border-radius:var(--rad);
  margin-bottom:5px;transition:all .12s;
  box-shadow:var(--card-shadow);
}
.task-row:hover{border-color:var(--bdr2);box-shadow:var(--card-shadow-hover)}
.task-row.is-done{
  background:rgba(74,222,128,.04);
  border-color:rgba(74,222,128,.12);
}
.task-row.is-done:hover{background:rgba(74,222,128,.07);border-color:rgba(74,222,128,.2)}
.task-row.is-done .task-title{color:var(--dim);text-decoration:line-through}
.task-check{
  width:16px;height:16px;border-radius:5px;
  border:1px solid var(--bdr3);background:none;
  cursor:pointer;flex-shrink:0;transition:all .12s;
  display:flex;align-items:center;justify-content:center;
}
.task-check.checked{background:var(--green-b);border-color:rgba(26,158,92,.35)}
.task-title{font-size:.77rem;color:var(--text);flex:1}
.task-assignee{font-size:.62rem;color:var(--dim);flex-shrink:0}
.add-task-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border:1px dashed var(--bdr2);
  border-radius:var(--rad);margin-top:4px;
}
.task-in{
  flex:1;background:none;border:none;outline:none;
  font-family:'Poppins',sans-serif;font-size:.77rem;color:var(--text);
}
.task-in::placeholder{color:var(--dim)}
.task-assign-select{
  background:var(--surf3);border:1px solid var(--bdr2);
  border-radius:6px;color:var(--sub);
  font-family:'Poppins',sans-serif;font-size:.66rem;
  padding:3px 6px;outline:none;color-scheme:dark;
}
.task-assign-select option{background:var(--surf)}
.task-add-ok{
  padding:3px 10px;border-radius:6px;
  background:var(--surf3);border:1px solid var(--bdr2);
  color:var(--sub);font-family:'Poppins',sans-serif;
  font-size:.68rem;cursor:pointer;transition:all .12s;flex-shrink:0;
}
.task-add-ok:hover{color:var(--text);border-color:var(--bdr3)}

/* task title btn */
.task-title-btn{
  flex:1;background:none;border:none;text-align:left;
  cursor:pointer;font-family:'Poppins',sans-serif;
  font-size:.77rem;color:var(--text);padding:0;transition:color .12s;
}
.task-title-btn:hover{color:var(--blue)}
.task-row.is-done .task-title-btn{color:var(--dim);text-decoration:line-through}

/* editor view */
.ed-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.ed-avatar-lg{
  width:38px;height:38px;border-radius:10px;
  background:var(--surf3);border:1px solid var(--bdr2);
  font-size:.75rem;font-weight:700;color:var(--sub);
  display:flex;align-items:center;justify-content:center;
}
.ed-name{font-size:1rem;font-weight:600;color:var(--text)}
.ed-task-proj{font-size:.63rem;color:var(--dim);margin-left:auto}

/* confirm inline */
.confirm-inline{display:flex;align-items:center;gap:8px;font-size:.7rem;color:var(--sub)}
.confirm-yes{
  color:var(--red);background:none;border:none;
  font-family:'Poppins',sans-serif;font-size:.7rem;cursor:pointer;
}
.confirm-yes:hover{text-decoration:underline}
.confirm-no{
  color:var(--dim);background:none;border:none;
  font-family:'Poppins',sans-serif;font-size:.7rem;cursor:pointer;
}
.confirm-no:hover{color:var(--sub)}

/* ── DIALOG ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(24,24,31,.3);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;z-index:100;
}
.glass-dialog{
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:16px;padding:24px;width:320px;
  display:flex;flex-direction:column;gap:16px;
  box-shadow:0 20px 60px rgba(0,0,0,.15),0 4px 12px rgba(0,0,0,.08);
}
.dlg-title{font-size:.86rem;font-weight:600;color:var(--text)}
.dlg-input{
  width:100%;background:var(--surf3);border:1px solid var(--bdr2);
  border-radius:8px;color:var(--text);
  font-family:'Poppins',sans-serif;font-size:.78rem;
  padding:9px 12px;outline:none;transition:border-color .12s;
}
.dlg-input:focus{border-color:var(--text)}
.dlg-btns{display:flex;gap:8px;justify-content:flex-end}
.dlg-cancel{
  padding:7px 16px;border-radius:8px;
  border:1px solid var(--bdr2);background:none;
  color:var(--sub);font-family:'Poppins',sans-serif;
  font-size:.73rem;cursor:pointer;transition:all .12s;
}
.dlg-cancel:hover{border-color:var(--bdr3);color:var(--text)}
.dlg-save{
  padding:7px 18px;border-radius:8px;border:none;
  background:var(--text);color:#ffffff;
  font-family:'Poppins',sans-serif;font-size:.73rem;
  font-weight:600;cursor:pointer;transition:all .12s;
}
.dlg-save:hover{opacity:.8}
.dlg-save:disabled{opacity:.4;cursor:not-allowed}

/* task view */
.task-view{display:flex;flex-direction:column;gap:20px;max-width:680px}
.task-view-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px}
.task-view-title{font-size:1.05rem;font-weight:600;color:var(--text);flex:1;word-break:break-word}
.tv-save{
  padding:9px 22px;border-radius:10px;border:none;
  background:var(--text);color:#ffffff;
  font-family:'Poppins',sans-serif;font-size:.76rem;font-weight:600;
  cursor:pointer;transition:all .12s;align-self:flex-start;flex-shrink:0;
}
.tv-save:hover{opacity:.8}
.tm-ta{
  width:100%;background:var(--surf);border:1px solid var(--bdr);
  border-radius:var(--rad);color:var(--text);
  font-family:'Poppins',sans-serif;font-size:.77rem;
  padding:12px 14px;resize:vertical;min-height:90px;
  outline:none;transition:border-color .12s;
}
.tm-ta:focus{border-color:var(--bdr3)}

/* ── MOBILE-FIRST ── */
.sidebar{
  position:fixed;top:0;left:0;z-index:50;
  width:80vw;max-width:280px;
  height:100vh;height:100dvh;
  transform:translateX(-100%);
  transition:transform .22s cubic-bezier(.4,0,.2,1),box-shadow .22s;
  box-shadow:none;
  -webkit-overflow-scrolling:touch;
}
.sidebar.open{transform:translateX(0);box-shadow:6px 0 40px rgba(0,0,0,.18)}

.sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(24,24,31,.25);z-index:49;
  backdrop-filter:blur(3px);
}
.sidebar-overlay.open{display:block}

.hamburger{
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:8px;
  border:1px solid var(--bdr2);background:none;
  cursor:pointer;color:var(--sub);flex-shrink:0;transition:all .12s;
}
.hamburger:hover{background:var(--s-act);color:var(--text)}

.main{flex:1;width:100%;display:flex;flex-direction:column;overflow:hidden}

.topbar{padding:12px 14px 10px;gap:10px}
.content{padding:14px}
.task-check{width:20px;height:20px}
.icon-btn{width:28px;height:28px}
.proj-card{padding:12px 14px}
.detail-wrap{gap:16px}
.status-tabs{flex-wrap:wrap}
.add-task-row{flex-wrap:wrap;gap:8px}
.task-assign-select{width:100%}
.glass-dialog{width:calc(100vw - 32px);max-width:360px}
.link-input-row{flex-wrap:wrap;gap:6px}
.link-sep{display:none}

.topbar-icon-btn{
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:8px;
  border:1px solid var(--bdr2);background:none;
  cursor:pointer;color:var(--sub);flex-shrink:0;transition:all .12s;
}
.topbar-icon-btn:hover{background:var(--s-act);color:var(--text)}

/* ── DESKTOP ── */
@media(min-width:641px){
  body{flex-direction:row}
  .sidebar{position:static;transform:none;box-shadow:none;flex-shrink:0}
  .sidebar-overlay{display:none !important}
  .hamburger{display:none}
  .topbar-icon-btn{display:none}
  .topbar{padding:16px 24px 12px}
  .content{padding:22px 24px}
  .glass-dialog{width:320px}
  .link-sep{display:block}
  .add-task-row{flex-wrap:nowrap}
  .task-assign-select{width:auto}
  .btn-add-label{display:inline}
}
</style>
</head>
<body>

      </button>

        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

<!-- Dialog: novo projeto -->

  <div class="glass-dialog">

<script>
/* ── Supabase ── */
const { createClient } = supabase;
const sb = createClient(
  'https://putooalmbcrrdmuebose.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1dG9vYWxtYmNycmRtdWVib3NlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzQ3NzUsImV4cCI6MjA5MjQ1MDc3NX0.PvAOzF66W9sUsaw-Us8onc4m3FRaxjrZiYeUVKeF_Q4'
);

/* ── State ── */
const state = { projects: [], tasks: [] };
let view = 'todos', prevView = 'todos';
let confirmTid = null, confirmPid = null;
let linkInputOpen = false;
let notesTimer = null;
let taskModal = null;
let taskDraft = {};
let taskDraftLinkOpen = false;

/* ── Editors ── */
const ALL_EDITORS = [
  { name:'Ashley Michel', init:'AM', view:'ed-ashley' },
  { name:'Caio Augusto',  init:'CA', view:'ed-caio'   },
  { name:'Rafael Castro', init:'RC', view:'ed-rafael' },
];
const VID_LABELS = { todos:'Todos os projetos', nao_editado:'Não editados', editando:'Em edição', editado:'Editados' };
const ST_LABELS  = { nao_editado:'Não Editado', editando:'Editando', editado:'Editado' };

/* ── Utils ── */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6) }
function today(){ return new Date().toISOString().slice(0,10) }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function fmtDate(d){ if(!d)return''; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}` }
function isLate(p){ return p.due_date && p.status !== 'editado' && p.due_date < today() }
function greeting(){ const h=new Date().getHours(); return h<12?'Bom dia,':h<18?'Boa tarde,':'Boa noite,' }

/* parse assigned_to — suporta array JSON ou string legada */
function getAssignees(t){
  if(!t.assigned_to) return [];
  try{ const p=JSON.parse(t.assigned_to); return Array.isArray(p)?p:[t.assigned_to].filter(Boolean); }
  catch{ return t.assigned_to?[t.assigned_to]:[]; }
}

/* theme removed — sempre light */

/* ── Go home ── */
function goHome(){
  view = 'todos'; prevView = 'todos';
  confirmTid = null; confirmPid = null; linkInputOpen = false;
  render();
}

/* ── Realtime indicator ── */
function setRtStatus(s){
  const dot = document.getElementById('rt-dot');
  const lbl = document.getElementById('rt-label');
  if(!dot) return;
  dot.className = 'rt-dot ' + s;
  const txt = s==='connected'?'Tempo real ativo':s==='connecting'?'Conectando…':'Desconectado';
  dot.title = txt;
  if(lbl) lbl.textContent = txt;
}

/* ── Init ── */
async function init(){
  const el = document.getElementById('content');

  const [pr, tr] = await Promise.all([
    sb.from('projects').select('*').order('created_at', { ascending: true }),
    sb.from('tasks').select('*').order('created_at', { ascending: true }),
  ]);

  if(pr.error || tr.error){
    const msg = (pr.error || tr.error).message || 'Erro desconhecido';
    setRtStatus('disconnected');
    el.innerHTML = `<div class="empty-state" style="gap:16px">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div style="text-align:center">
        <p style="color:var(--text);margin-bottom:4px">Não foi possível conectar ao banco de dados</p>
        <p style="font-size:.7rem;color:var(--dim);max-width:340px">${esc(msg)}</p>
        <p style="font-size:.7rem;color:var(--dim);margin-top:8px">Verifique se as tabelas foram criadas no Supabase e recarregue a página.</p>
      </div>
      <button onclick="location.reload()" style="padding:7px 18px;border-radius:20px;border:1px solid var(--bdr3);background:none;color:var(--sub);font-family:'Poppins',sans-serif;font-size:.73rem;cursor:pointer">Tentar novamente</button>
    </div>`;
    return;
  }

  state.projects = pr.data || [];
  state.tasks    = tr.data || [];

  if(!state.projects.length) await seed();

  render();

  /* Real-time channel */
  sb.channel('vf-realtime')
    .on('postgres_changes', { event:'*', schema:'public', table:'projects' }, ({ eventType, new: n, old: o }) => {
      if      (eventType === 'INSERT') state.projects = [...state.projects, n];
      else if (eventType === 'UPDATE') state.projects = state.projects.map(p => p.id === n.id ? n : p);
      else if (eventType === 'DELETE') state.projects = state.projects.filter(p => p.id !== o.id);
      render();
    })
    .on('postgres_changes', { event:'*', schema:'public', table:'tasks' }, ({ eventType, new: n, old: o }) => {
      if      (eventType === 'INSERT') state.tasks = [...state.tasks, n];
      else if (eventType === 'UPDATE') state.tasks = state.tasks.map(t => t.id === n.id ? n : t);
      else if (eventType === 'DELETE') state.tasks = state.tasks.filter(t => t.id !== o.id);
      render();
    })
    .subscribe(status => {
      if      (status === 'SUBSCRIBED')    setRtStatus('connected');
      else if (status === 'CHANNEL_ERROR') setRtStatus('disconnected');
      else                                 setRtStatus('connecting');
    });
}

/* ── Seed ── */
async function seed(){
  const ps = [
    { id:uid(), title:'Podcast Ep. 42',  status:'nao_editado', editors:['Ashley Michel'], notes:'Gravar intro separado.', links:[], due_date:'', created_at:today() },
    { id:uid(), title:'Vlog Semana 18',  status:'editando',    editors:['Caio Augusto'],  notes:'', links:[], due_date:'', created_at:today() },
    { id:uid(), title:'Review iPhone 16',status:'editado',     editors:['Rafael Castro'], notes:'Aprovado pelo cliente.', links:[], due_date:'', created_at:today() },
  ];
  const { data } = await sb.from('projects').insert(ps).select();
  state.projects = data || ps;
}

/* ── Sidebar mobile ── */
function toggleSidebar(){
  const sidebarEl = document.querySelector('.sidebar');
  const ov = document.getElementById('sidebar-overlay');
  const open = sidebarEl.classList.toggle('open');
  ov.classList.toggle('open', open);
}
function closeSidebar(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

/* ── Nav ── */
function setView(el, v){
  if(!view.startsWith('proj-')) prevView = view;
  view = v;
  closeSidebar();
  render();
}
function openProj(pid){
  prevView = view;
  view = 'proj-' + pid;
  confirmTid = null;
  linkInputOpen = false;
  closeSidebar();
  render();
}

/* ── Render ── */
function render(){
  const grEl = document.getElementById('greeting');
  if(grEl) grEl.textContent = greeting();
  renderSidebar();
  const el = document.getElementById('content');
  const titleEl = document.getElementById('view-title');
  if(!el) return;
  if(view.startsWith('task-'))      renderTaskView(el, titleEl, view.slice(5));
  else if(view.startsWith('proj-')) renderDetail(el, titleEl, view.slice(5));
  else if(view.startsWith('ed-'))   renderEditorView(el, titleEl);
  else                              renderList(el, titleEl);
}

function renderSidebar(){
  ALL_EDITORS.forEach(e => {
    const c = state.tasks.filter(t => !t.done && getAssignees(t).includes(e.name)).length;
    const el = document.getElementById('nc-' + e.view);
    if(el) el.textContent = c || '';
  });

  const nav = document.getElementById('proj-nav');
  if(!nav) return;
  if(!state.projects.length){
    nav.innerHTML = '<div class="proj-empty">Nenhum projeto ainda</div>';
  } else {
    nav.innerHTML = state.projects.map(p => `
      <button class="n-item${view==='proj-'+p.id?' active':''}" onclick="openProj('${p.id}')" data-view="proj-${p.id}">
        <span style="flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.72rem">${esc(p.title)}</span>
        <span class="status-badge st-${p.status}" style="font-size:.52rem;padding:2px 7px">${ST_LABELS[p.status]}</span>
      </button>`).join('');
  }

  document.querySelectorAll('.n-item').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
}

/* ── List view ── */
function renderList(el, titleEl){
  titleEl.textContent = VID_LABELS[view] || 'Todos os projetos';
  let ps = state.projects;
  if(view === 'nao_editado') ps = ps.filter(p => p.status === 'nao_editado');
  else if(view === 'editando')   ps = ps.filter(p => p.status === 'editando');
  else if(view === 'editado')    ps = ps.filter(p => p.status === 'editado');

  if(!ps.length){
    el.innerHTML = `<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
      <p>Nenhum projeto encontrado</p></div>`;
    return;
  }

  el.innerHTML = `<div class="proj-grid">${ps.map(p => {
    const ts = state.tasks.filter(t => t.project_id === p.id);
    const done = ts.filter(t => t.done).length;
    const late = isLate(p);
    const dueTxt = p.due_date
      ? `<span class="proj-card-due${late?' late':''}">${late?'⚠ Atrasado · ':''}${fmtDate(p.due_date)}</span>` : '';
    if(confirmPid === p.id){
      return `<div class="proj-card" style="cursor:default">
        <span class="confirm-inline">Apagar <strong style="color:var(--text)">${esc(p.title)}</strong>?
          <button class="confirm-yes" onclick="deleteProject('${p.id}')">Apagar</button>
          <button class="confirm-no" onclick="confirmPid=null;render()">Cancelar</button>
        </span>
      </div>`;
    }
    return `<div class="proj-card" onclick="openProj('${p.id}')">
      <div style="flex:1;min-width:0">
        <div class="proj-card-title">${esc(p.title)}</div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:3px">
          ${p.editors?.length ? `<span class="proj-card-meta">${esc(p.editors.join(', '))}</span>` : ''}
          ${ts.length ? `<span class="proj-card-meta">${done}/${ts.length} tarefas</span>` : ''}
          ${dueTxt}
        </div>
      </div>
      <span class="status-badge st-${p.status}">${ST_LABELS[p.status]}</span>
      <button class="icon-btn" onclick="event.stopPropagation();confirmPid='${p.id}';render()" title="Apagar projeto">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      </button>
    </div>`;
  }).join('')}</div>`;
}

/* ── Editor view ── */
function renderEditorView(el, titleEl){
  const map = { 'ed-ashley':'Ashley Michel', 'ed-caio':'Caio Augusto', 'ed-rafael':'Rafael Castro' };
  const edName = map[view] || '';
  const edInfo = ALL_EDITORS.find(e => e.name === edName);
  titleEl.textContent = edName;

  const ts = state.tasks.filter(t => getAssignees(t).includes(edName));
  if(!ts.length){
    el.innerHTML = `<div class="ed-header"><div class="ed-avatar-lg">${edInfo?.init||''}</div><div class="ed-name">${esc(edName)}</div></div>
      <div class="empty-state"><p>Nenhuma tarefa atribuída</p></div>`;
    return;
  }

  el.innerHTML = `<div class="ed-header"><div class="ed-avatar-lg">${edInfo?.init||''}</div><div class="ed-name">${esc(edName)}</div></div>
    <div class="proj-grid">${ts.map(t => {
      const p = state.projects.find(p => p.id === t.project_id);
      return `<div class="task-row${t.done?' is-done':''}" style="cursor:pointer" onclick="openProj('${t.project_id}')">
        <button class="task-check${t.done?' checked':''}" onclick="event.stopPropagation();toggleTask('${t.id}')" title="${t.done?'Desmarcar':'Concluir'}">
          ${t.done?`<svg width="10" height="10" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="var(--green)" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>`:''}
        </button>
        <span class="task-title">${esc(t.title)}</span>
        ${p ? `<span class="ed-task-proj">${esc(p.title)}</span>` : ''}
      </div>`;
    }).join('')}</div>`;
}

/* ── Detail view ── */
function renderDetail(el, titleEl, pid){
  const p = state.projects.find(p => p.id === pid);
  if(!p){ view = prevView; render(); return; }
  titleEl.textContent = p.title;

  const ts = state.tasks.filter(t => t.project_id === pid);

  const statusTabs = `<div>
    <div class="section-label">Status</div>
    <div class="status-tabs">
      ${['nao_editado','editando','editado'].map(s =>
        `<button class="st-tab${p.status===s?' active-'+s:''}" onclick="setStatus('${pid}','${s}')">${ST_LABELS[s]}</button>`
      ).join('')}
    </div></div>`;

  const editorPills = `<div>
    <div class="section-label">Editores</div>
    <div class="editor-pills">
      ${ALL_EDITORS.map(e => {
        const sel = p.editors?.includes(e.name);
        return `<button class="ed-pill${sel?' selected':''}" onclick="toggleEditor('${pid}','${e.name}')">
          <span class="e-avatar">${e.init}</span>${esc(e.name)}
        </button>`;
      }).join('')}
    </div></div>`;

  const late = isLate(p);
  const dueSection = `<div>
    <div class="section-label">Entrega</div>
    <div class="due-row">
      <input type="date" class="due-input" value="${p.due_date||''}" onchange="saveDueDate('${pid}',this.value)">
      ${late ? '<span class="due-late-tag">Atrasado</span>' : ''}
    </div></div>`;

  const notesSection = `<div>
    <div class="section-label">Notas</div>
    <textarea class="notes-ta" placeholder="Adicionar notas…" oninput="saveNotes('${pid}',this.value)">${esc(p.notes||'')}</textarea>
  </div>`;

  const linksHtml = (p.links||[]).map(l => `
    <div class="link-item">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="flex-shrink:0;opacity:.4"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <a class="link-anchor" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label||l.url)}</a>
      <button class="icon-btn" onclick="removeLink('${pid}','${l.id}')" title="Remover">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join('');

  const linkInputHtml = linkInputOpen
    ? `<div class="link-input-row">
        <input class="link-in" id="link-url-in" placeholder="URL…" onkeydown="if(event.key==='Enter')addLink('${pid}');if(event.key==='Escape')hideLinkInput()">
        <div class="link-sep"></div>
        <input class="link-in" id="link-label-in" placeholder="Rótulo opcional" style="max-width:120px" onkeydown="if(event.key==='Enter')addLink('${pid}');if(event.key==='Escape')hideLinkInput()">
        <button class="link-ok-btn" onclick="addLink('${pid}')">Salvar</button>
        <button class="link-cancel-btn" onclick="hideLinkInput()">✕</button>
      </div>`
    : `<button class="add-link-btn" onclick="showLinkInput()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar link
      </button>`;

  const linksSection = `<div>
    <div class="section-label">Links</div>
    ${linksHtml}${linkInputHtml}
  </div>`;

  const taskRows = ts.map(t => {
    if(confirmTid === t.id){
      return `<div class="task-row">
        <span class="confirm-inline">Remover tarefa?
          <button class="confirm-yes" onclick="deleteTask('${t.id}')">Remover</button>
          <button class="confirm-no" onclick="confirmTid=null;render()">Cancelar</button>
        </span></div>`;
    }
    return `<div class="task-row${t.done?' is-done':''}">
      <button class="task-check${t.done?' checked':''}" onclick="toggleTask('${t.id}')" title="${t.done?'Desmarcar':'Concluir'}">
        ${t.done?`<svg width="10" height="10" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="var(--green)" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>`:''}
      </button>
      <button class="task-title-btn" onclick="openTaskModal('${t.id}')">${esc(t.title)}</button>
      ${getAssignees(t).length ? `<span class="task-assignee">${esc(getAssignees(t).join(', '))}</span>` : ''}
      <button class="icon-btn" onclick="confirmTid='${t.id}';render()" title="Remover">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      </button>
    </div>`;
  }).join('');

  const taskSection = `<div>
    <div class="section-label">Tarefas</div>
    ${taskRows}
    <div class="add-task-row">
      <input class="task-in" id="task-in-${pid}" placeholder="Nova tarefa… (Enter para adicionar)">
      <select class="task-assign-select" id="task-assign-${pid}">
        <option value="">Sem responsável</option>
        ${ALL_EDITORS.map(e => `<option value="${e.name}">${e.name}</option>`).join('')}
      </select>
      <button class="task-add-ok" onclick="addTask('${pid}')">+</button>
    </div></div>`;

  el.innerHTML = `<div style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <button class="back-btn" onclick="view=prevView;confirmTid=null;linkInputOpen=false;render()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
        Voltar
      </button>
      ${confirmPid===pid
        ? `<span class="confirm-inline">Apagar projeto?
            <button class="confirm-yes" onclick="deleteProject('${pid}')">Apagar</button>
            <button class="confirm-no" onclick="confirmPid=null;render()">Cancelar</button>
           </span>`
        : `<button class="icon-btn" onclick="confirmPid='${pid}';render()" title="Apagar projeto">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
           </button>`
      }
    </div>
    <div class="detail-title">${esc(p.title)}</div>
  </div>
  <div class="detail-wrap">${statusTabs}${editorPills}${dueSection}${notesSection}${linksSection}${taskSection}</div>`;

  const tin = document.getElementById('task-in-' + pid);
  if(tin) tin.addEventListener('keydown', e => { if(e.key === 'Enter') addTask(pid) });
}

/* ── Toast ── */
function showToast(msg, type='error'){
  let t = document.getElementById('vf-toast');
  if(!t){ t = document.createElement('div'); t.id='vf-toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    padding:10px 18px;border-radius:10px;font-family:'Poppins',sans-serif;font-size:.73rem;
    z-index:9999;pointer-events:none;transition:opacity .3s;
    background:${type==='error'?'rgba(255,68,68,.95)':'rgba(170,255,45,.95)'};
    color:${type==='error'?'#fff':'#0c0c0e'};
    box-shadow:0 4px 24px rgba(0,0,0,.5);font-weight:500;`;
  t.style.opacity = '1';
  clearTimeout(t._hide);
  t._hide = setTimeout(() => { t.style.opacity='0'; }, 3000);
}

/* ── DB write helper — optimistic com rollback ── */
async function dbWrite(optimisticFn, writeFn, rollbackFn){
  optimisticFn(); render();
  const { error } = await writeFn();
  if(error){ rollbackFn(); render(); showToast('Erro ao salvar: ' + (error.message || 'verifique a conexão')); return false; }
  return true;
}

/* ── Actions ── */
async function setStatus(pid, s){
  const prev = state.projects.find(p => p.id === pid)?.status;
  await dbWrite(
    () => { state.projects = state.projects.map(p => p.id===pid ? {...p,status:s} : p); },
    () => sb.from('projects').update({ status:s }).eq('id', pid),
    () => { state.projects = state.projects.map(p => p.id===pid ? {...p,status:prev} : p); }
  );
}

async function toggleEditor(pid, name){
  const prev = state.projects.find(p => p.id===pid)?.editors || [];
  const next = prev.includes(name) ? prev.filter(e=>e!==name) : [...prev, name];
  await dbWrite(
    () => { state.projects = state.projects.map(p => p.id===pid ? {...p,editors:next} : p); },
    () => sb.from('projects').update({ editors:next }).eq('id', pid),
    () => { state.projects = state.projects.map(p => p.id===pid ? {...p,editors:prev} : p); }
  );
}

async function saveDueDate(pid, val){
  const prev = state.projects.find(p => p.id===pid)?.due_date || '';
  await dbWrite(
    () => { state.projects = state.projects.map(p => p.id===pid ? {...p,due_date:val} : p); },
    () => sb.from('projects').update({ due_date:val }).eq('id', pid),
    () => { state.projects = state.projects.map(p => p.id===pid ? {...p,due_date:prev} : p); }
  );
}

function saveNotes(pid, val){
  state.projects = state.projects.map(p => p.id===pid ? {...p,notes:val} : p);
  clearTimeout(notesTimer);
  notesTimer = setTimeout(async () => {
    const { error } = await sb.from('projects').update({ notes:val }).eq('id', pid);
    if(error) showToast('Erro ao salvar nota: ' + error.message);
  }, 800);
}

async function addTask(pid){
  const tin  = document.getElementById('task-in-' + pid);
  const asel = document.getElementById('task-assign-' + pid);
  const title = (tin?.value || '').trim();
  if(!title) return;
  const t = { id:uid(), project_id:pid, title, assigned_to: JSON.stringify(asel?.value ? [asel.value] : []), done:false, created_at:today() };
  await dbWrite(
    () => { state.tasks = [...state.tasks, t]; },
    () => sb.from('tasks').insert(t),
    () => { state.tasks = state.tasks.filter(x => x.id !== t.id); }
  );
}

async function toggleTask(tid){
  const t = state.tasks.find(t => t.id===tid);
  if(!t) return;
  await dbWrite(
    () => { state.tasks = state.tasks.map(x => x.id===tid ? {...x,done:!t.done} : x); },
    () => sb.from('tasks').update({ done:!t.done }).eq('id', tid),
    () => { state.tasks = state.tasks.map(x => x.id===tid ? {...x,done:t.done} : x); }
  );
}

async function deleteTask(tid){
  const backup = state.tasks.find(t => t.id===tid);
  confirmTid = null;
  await dbWrite(
    () => { state.tasks = state.tasks.filter(t => t.id!==tid); },
    () => sb.from('tasks').delete().eq('id', tid),
    () => { state.tasks = [...state.tasks, backup]; }
  );
}

async function deleteProject(pid){
  const backupP = state.projects.find(p => p.id===pid);
  const backupT = state.tasks.filter(t => t.project_id===pid);
  confirmPid = null;
  view = prevView;
  await dbWrite(
    () => { state.projects = state.projects.filter(p => p.id!==pid); state.tasks = state.tasks.filter(t => t.project_id!==pid); },
    async () => { await sb.from('tasks').delete().eq('project_id', pid); return sb.from('projects').delete().eq('id', pid); },
    () => { state.projects = [...state.projects, backupP]; state.tasks = [...state.tasks, ...backupT]; view = 'proj-'+pid; }
  );
}

function showLinkInput(){ linkInputOpen = true; render(); setTimeout(() => document.getElementById('link-url-in')?.focus(), 50) }
function hideLinkInput(){ linkInputOpen = false; render() }

async function addLink(pid){
  const url = (document.getElementById('link-url-in')?.value || '').trim();
  if(!url) return;
  const label = (document.getElementById('link-label-in')?.value || '').trim();
  const link = { id:uid(), url, label };
  const prevLinks = state.projects.find(p => p.id===pid)?.links || [];
  linkInputOpen = false;
  await dbWrite(
    () => { state.projects = state.projects.map(p => p.id===pid ? {...p,links:[...prevLinks,link]} : p); },
    () => { const p = state.projects.find(p => p.id===pid); return sb.from('projects').update({ links:p.links }).eq('id', pid); },
    () => { state.projects = state.projects.map(p => p.id===pid ? {...p,links:prevLinks} : p); linkInputOpen=true; }
  );
}

async function removeLink(pid, lid){
  const prevLinks = state.projects.find(p => p.id===pid)?.links || [];
  const next = prevLinks.filter(l => l.id!==lid);
  await dbWrite(
    () => { state.projects = state.projects.map(p => p.id===pid ? {...p,links:next} : p); },
    () => sb.from('projects').update({ links:next }).eq('id', pid),
    () => { state.projects = state.projects.map(p => p.id===pid ? {...p,links:prevLinks} : p); }
  );
}

/* ── New project dialog ── */
function openNewProj(){
  document.getElementById('new-proj-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('new-proj-input')?.focus(), 50);
}
function closeNewProj(){
  document.getElementById('new-proj-overlay').style.display = 'none';
  document.getElementById('new-proj-input').value = '';
  document.getElementById('dlg-save-btn').disabled = false;
  document.getElementById('dlg-save-btn').textContent = 'Criar';
}
async function saveNewProj(){
  const title = (document.getElementById('new-proj-input')?.value || '').trim();
  if(!title) return;
  const btn = document.getElementById('dlg-save-btn');
  btn.disabled = true;
  btn.textContent = 'Salvando…';
  const p = { id:uid(), title, status:'nao_editado', editors:[], notes:'', links:[], due_date:'', created_at:today() };
  const { error } = await sb.from('projects').insert(p);
  if(error){ btn.disabled = false; btn.textContent = 'Criar'; showToast('Erro ao criar projeto: ' + error.message); return; }
  state.projects = [...state.projects, p];
  closeNewProj();
  view = 'proj-' + p.id;
  render();
}
document.getElementById('new-proj-input').addEventListener('keydown', e => { if(e.key==='Enter') saveNewProj() });

/* ── Task View ── */
function openTaskModal(tid){
  const t = state.tasks.find(t => t.id === tid);
  if(!t) return;
  taskModal = tid;
  taskDraft = { assignees: getAssignees(t), notes: t.notes||'', links: [...(t.links||[])] };
  taskDraftLinkOpen = false;
  prevView = view;
  view = 'task-' + tid;
  render();
}

function closeTaskModal(){
  taskModal = null; taskDraft = {}; taskDraftLinkOpen = false;
  view = prevView; render();
}

function renderTaskView(el, titleEl, tid){
  const t = state.tasks.find(t => t.id === tid);
  if(!t){ closeTaskModal(); return; }
  const proj = state.projects.find(p => p.id === t.project_id);
  titleEl.textContent = t.title;

  const linksHtml = (taskDraft.links||[]).map(l => `
    <div class="link-item">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="flex-shrink:0;opacity:.4"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <a class="link-anchor" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label||l.url)}</a>
      <button class="icon-btn" onclick="tmRemoveLink('${l.id}')" title="Remover">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join('');

  const linkInputHtml = taskDraftLinkOpen
    ? `<div class="link-input-row">
        <input class="link-in" id="tm-url-in" placeholder="URL…" onkeydown="if(event.key==='Enter')tmAddLink();if(event.key==='Escape')tmHideLink()">
        <div class="link-sep"></div>
        <input class="link-in" id="tm-label-in" placeholder="Rótulo opcional" style="max-width:110px" onkeydown="if(event.key==='Enter')tmAddLink()">
        <button class="link-ok-btn" onclick="tmAddLink()">Salvar</button>
        <button class="link-cancel-btn" onclick="tmHideLink()">✕</button>
      </div>`
    : `<button class="add-link-btn" onclick="tmShowLink()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar link
      </button>`;

  el.innerHTML = `
    <div class="task-view">
      <div>
        <button class="back-btn" onclick="closeTaskModal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
          ${proj ? esc(proj.title) : 'Voltar'}
        </button>
        <div class="task-view-header">
          <div class="task-view-title">${esc(t.title)}</div>
          <span class="status-badge st-${t.done?'editado':'editando'}" style="flex-shrink:0">${t.done?'Concluída':'Em aberto'}</span>
        </div>
      </div>

      <div>
        <div class="section-label">Responsáveis</div>
        <div class="editor-pills">
          ${ALL_EDITORS.map(e => {
            const sel = taskDraft.assignees.includes(e.name);
            return `<button class="ed-pill${sel?' selected':''}" onclick="tmToggleAssignee('${e.name}')">
              <span class="e-avatar">${e.init}</span>${esc(e.name)}
            </button>`;
          }).join('')}
        </div>
      </div>

      <div>
        <div class="section-label">Notas</div>
        <textarea class="tm-ta" placeholder="Adicionar notas…" oninput="taskDraft.notes=this.value">${esc(taskDraft.notes)}</textarea>
      </div>

      <div>
        <div class="section-label">Links</div>
        ${linksHtml}${linkInputHtml}
      </div>

      <div style="display:flex;gap:8px;padding-top:4px">
        <button class="dlg-cancel" onclick="closeTaskModal()">Cancelar</button>
        <button class="tv-save" onclick="saveTaskModal()">Salvar alterações</button>
      </div>
    </div>`;

  if(taskDraftLinkOpen) setTimeout(()=>document.getElementById('tm-url-in')?.focus(), 50);
}

function tmToggleAssignee(name){
  const has = taskDraft.assignees.includes(name);
  taskDraft.assignees = has ? taskDraft.assignees.filter(n => n !== name) : [...taskDraft.assignees, name];
  render();
}
function tmShowLink(){ taskDraftLinkOpen = true; render(); }
function tmHideLink(){ taskDraftLinkOpen = false; render(); }
function tmAddLink(){
  const url = (document.getElementById('tm-url-in')?.value||'').trim();
  if(!url) return;
  const label = (document.getElementById('tm-label-in')?.value||'').trim();
  taskDraft.links = [...taskDraft.links, { id:uid(), url, label }];
  taskDraftLinkOpen = false;
  render();
}
function tmRemoveLink(lid){
  taskDraft.links = taskDraft.links.filter(l => l.id !== lid);
  render();
}

async function saveTaskModal(){
  const tid = taskModal;
  const t = state.tasks.find(t => t.id === tid);
  if(!t) return;
  const updates = { assigned_to: JSON.stringify(taskDraft.assignees), notes: taskDraft.notes, links: taskDraft.links };
  const prev = { assigned_to: t.assigned_to, notes: t.notes||'', links: t.links||[] };
  closeTaskModal();
  state.tasks = state.tasks.map(x => x.id === tid ? {...x, ...updates} : x);
  render();
  const { error } = await sb.from('tasks').update(updates).eq('id', tid);
  if(error){
    state.tasks = state.tasks.map(x => x.id === tid ? {...x, ...prev} : x);
    render();
    showToast('Erro ao salvar tarefa: ' + error.message);
  }
}

/* ── Boot ── */
init();
</script>
</body>
</html>
